services:
  app:
    build:
      context: .
    command: poetry run uvicorn interface.web.main:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/src
    ports:
      - "80:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
